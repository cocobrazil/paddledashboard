<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pine Beach Dashboard</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#050b16;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

.container{
    width:100vw;
    height:100vh;
    padding:1vh 1vw;
    display:flex;
    flex-direction:column;
    gap:1vh;
}

/* HEADER */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.title{
    display:flex;
    align-items:center;
    gap:1vw;
}

.title h1{
    font-size:4vh;
    margin:0;
    font-weight:700;
}

.subtitle{
    font-size:2vh;
    opacity:0.8;
}

.clock{
    text-align:right;
}

#time{
    font-size:4vh;
    font-weight:bold;
}

#date{
    font-size:2vh;
    opacity:0.7;
}

/* PADDLE CONDITIONS */

.conditions{
    background:linear-gradient(90deg,#0d2d12,#05140a);
    border:2px solid #2eff59;
    border-radius:2vh;
    padding:1.5vh 2vw;

    display:flex;
    align-items:center;
    justify-content:space-between;
}

.condition-left{
    display:flex;
    align-items:center;
    gap:2vw;
}

.condition-icon{
    font-size:8vh;
}

.condition-text h2{
    margin:0;
    font-size:2.5vh;
    opacity:0.9;
}

#rating{
    font-size:6vh;
    font-weight:900;
}

#conditionDetail{
    font-size:2.2vh;
    opacity:0.85;
}

/* MAIN CARDS */

.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:1vw;
}

.card{
    background:#0a1628;
    border-radius:2vh;
    padding:2vh 1vw;
    text-align:center;
    border:1px solid rgba(255,255,255,0.08);
}

.card-title{
    font-size:2vh;
    opacity:0.85;
    margin-bottom:1vh;
}

.card-emoji{
    font-size:5vh;
}

.card-value{
    font-size:7vh;
    font-weight:800;
}

.card-unit{
    font-size:3vh;
}

/* HOURLY */

.forecast{
    background:#08111f;
    border-radius:2vh;
    padding:1vh;
    flex:1;
    display:flex;
    flex-direction:column;
}

.forecast-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:1vh;
    padding:0 1vw;
}

.forecast-header h2{
    margin:0;
    font-size:3vh;
}

.sun-times{
    font-size:2vh;
    opacity:0.8;
}

.hourly{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(95px,1fr));
    gap:0.5vw;
    height:100%;
}

.hour{
    background:#10203a;
    border-radius:1.5vh;
    padding:1vh 0.3vw;
    text-align:center;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.hour-time{
    font-size:2vh;
    font-weight:bold;
}

.hour-icon{
    font-size:4vh;
}

.hour-temp{
    font-size:3.5vh;
    font-weight:bold;
}

.hour-wind{
    font-size:1.8vh;
    color:#4fc3ff;
}

.hour-gust{
    font-size:1.8vh;
    color:#d18cff;
}

.hour-rain{
    font-size:1.7vh;
    color:#7fdcff;
}

/* FOOTER */

.footer{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:1vw;
}

.footer-card{
    background:#08111f;
    border-radius:1.5vh;
    padding:1vh;
    text-align:center;
}

.footer-title{
    font-size:1.8vh;
    opacity:0.7;
}

.footer-value{
    font-size:3vh;
    font-weight:bold;
}

.good{
    color:#62ff84;
}

.caution{
    color:#ffd95c;
}

.bad{
    color:#ff6b6b;
}

</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->

    <div class="header">

        <div class="title">
            <div style="font-size:5vh;">🏄</div>

            <div>
                <h1>PINE BEACH PARK</h1>
                <div class="subtitle">Dorval, QC 🇨🇦</div>
            </div>
        </div>

        <div class="clock">
            <div id="time">--:--</div>
            <div id="date">---</div>
        </div>

    </div>

    <!-- CONDITIONS -->

    <div class="conditions">

        <div class="condition-left">

            <div class="condition-icon">🟢</div>

            <div class="condition-text">
                <h2>PADDLE CONDITIONS</h2>
                <div id="rating">--</div>
            </div>

        </div>

        <div id="conditionDetail">
            Checking conditions...
        </div>

    </div>

    <!-- MAIN CARDS -->

    <div class="cards">

        <div class="card">
            <div class="card-title">🌡 TEMPERATURE</div>
            <div class="card-emoji">🌤</div>
            <div class="card-value" id="temp">--</div>
        </div>

        <div class="card">
            <div class="card-title">💨 WIND</div>
            <div class="card-emoji">🌬</div>
            <div class="card-value" id="wind">--</div>
        </div>

        <div class="card">
            <div class="card-title">💥 GUSTS</div>
            <div class="card-emoji">💨</div>
            <div class="card-value" id="gusts">--</div>
        </div>

        <div class="card">
            <div class="card-title">🍃 AIR QUALITY</div>
            <div class="card-emoji">🌿</div>
            <div class="card-value" id="aqi">--</div>
        </div>

    </div>

    <!-- FORECAST -->

    <div class="forecast">

        <div class="forecast-header">

            <h2>☀ HOURLY FORECAST</h2>

            <div class="sun-times">
                Sunrise: <span id="sunrise">--</span>
                |
                Sunset: <span id="sunset">--</span>
            </div>

        </div>

        <div class="hourly" id="hourly"></div>

    </div>

    <!-- FOOTER -->

    <div class="footer">

        <div class="footer-card">
            <div class="footer-title">💧 HUMIDITY</div>
            <div class="footer-value" id="humidity">--</div>
        </div>

        <div class="footer-card">
            <div class="footer-title">☀ UV INDEX</div>
            <div class="footer-value" id="uv">--</div>
        </div>

        <div class="footer-card">
            <div class="footer-title">🌧 RAIN</div>
            <div class="footer-value" id="rain">--</div>
        </div>

        <div class="footer-card">
            <div class="footer-title">🧭 WIND DIR</div>
            <div class="footer-value" id="direction">--</div>
        </div>

    </div>

</div>

<script>

function updateClock(){

    const now = new Date();

    document.getElementById('time').innerHTML =
        now.toLocaleTimeString([], {
            hour:'numeric',
            minute:'2-digit'
        });

    document.getElementById('date').innerHTML =
        now.toLocaleDateString([], {
            weekday:'short',
            month:'short',
            day:'numeric'
        });

}

setInterval(updateClock,1000);
updateClock();

function getWindDirection(deg){

    const dirs = ['N','NE','E','SE','S','SW','W','NW'];

    return dirs[Math.round(deg/45)%8];

}

async function loadWeather(){

const weatherURL =
'https://api.open-meteo.com/v1/forecast?latitude=45.431&longitude=-73.742&current=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_gusts_10m,wind_direction_10m,uv_index,precipitation&hourly=temperature_2m,wind_speed_10m,wind_gusts_10m,precipitation_probability,weather_code&daily=sunrise,sunset&timezone=auto';

const airURL =
'https://air-quality-api.open-meteo.com/v1/air-quality?latitude=45.431&longitude=-73.742&current=us_aqi';

const weatherResponse = await fetch(weatherURL);
const weatherData = await weatherResponse.json();

const airResponse = await fetch(airURL);
const airData = await airResponse.json();

const current = weatherData.current;

document.getElementById('temp').innerHTML =
Math.round(current.temperature_2m) + '°';

document.getElementById('wind').innerHTML =
Math.round(current.wind_speed_10m);

document.getElementById('gusts').innerHTML =
Math.round(current.wind_gusts_10m);

document.getElementById('aqi').innerHTML =
airData.current.us_aqi;

document.getElementById('humidity').innerHTML =
current.relative_humidity_2m + '%';

document.getElementById('uv').innerHTML =
Math.round(current.uv_index);

document.getElementById('rain').innerHTML =
current.precipitation + ' mm';

document.getElementById('direction').innerHTML =
getWindDirection(current.wind_direction_10m);

document.getElementById('sunrise').innerHTML =
weatherData.daily.sunrise[0].split('T')[1];

document.getElementById('sunset').innerHTML =
weatherData.daily.sunset[0].split('T')[1];

/* PADDLE RATING */

const wind = current.wind_speed_10m;
const gusts = current.wind_gusts_10m;

let rating = '';
let detail = '';

if(wind < 10 && gusts < 15){

    rating = 'EXCELLENT';
    detail = 'Calm water and ideal paddle conditions.';

    document.getElementById('rating').className = 'good';
}
else if(wind < 18){

    rating = 'CAUTION';
    detail = 'Moderate chop possible on open water.';

    document.getElementById('rating').className = 'caution';
}
else{

    rating = 'NO GO';
    detail = 'Strong winds and difficult paddle conditions.';

    document.getElementById('rating').className = 'bad';
}

document.getElementById('rating').innerHTML = rating;
document.getElementById('conditionDetail').innerHTML = detail;

/* HOURLY */

const hourlyDiv = document.getElementById('hourly');

hourlyDiv.innerHTML = '';

const sunriseHour =
parseInt(weatherData.daily.sunrise[0].split('T')[1]);

const sunsetHour =
parseInt(weatherData.daily.sunset[0].split('T')[1]);

for(let i = 0; i < weatherData.hourly.time.length; i++){

    const date = new Date(weatherData.hourly.time[i]);

    const hour = date.getHours();

    if(hour < sunriseHour || hour > sunsetHour){
        continue;
    }

    const temp =
    Math.round(weatherData.hourly.temperature_2m[i]);

    const wind =
    Math.round(weatherData.hourly.wind_speed_10m[i]);

    const gust =
    Math.round(weatherData.hourly.wind_gusts_10m[i]);

    const rain =
    weatherData.hourly.precipitation_probability[i];

    let icon = '☀️';

    if(rain > 40){
        icon = '🌧';
    }
    else if(rain > 15){
        icon = '⛅';
    }

    hourlyDiv.innerHTML += `

    <div class="hour">

        <div class="hour-time">
            ${date.toLocaleTimeString([],{
                hour:'numeric'
            })}
        </div>

        <div class="hour-icon">
            ${icon}
        </div>

        <div class="hour-temp">
            ${temp}°
        </div>

        <div class="hour-wind">
            💨 ${wind}
        </div>

        <div class="hour-gust">
            ⚡ ${gust}
        </div>

        <div class="hour-rain">
            ☔ ${rain}%
        </div>

    </div>

    `;
}

}

loadWeather();

setInterval(loadWeather,900000);

</script>

</body>
</html>
