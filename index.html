<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Pine Beach SUP Dashboard</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial, sans-serif;
    padding:12px;
    overflow-x:hidden;
}

/* Header */
h1{
    font-size:34px;
    margin:5px 0 10px 0;
}

/* Paddle condition top */
.paddle{
    background:#1e1e1e;
    padding:14px;
    border-radius:16px;
    margin-bottom:12px;
    text-align:center;
}

.paddle .label{
    font-size:16px;
    opacity:0.7;
}

.paddle .big{
    font-size:34px;
    font-weight:bold;
}

/* 4 main cards grid */
.grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:10px;
    margin-bottom:12px;
}

.card{
    background:#1c1c1c;
    padding:12px;
    border-radius:14px;
    text-align:center;
}

.big{
    font-size:34px;
    font-weight:bold;
}

.label{
    font-size:14px;
    opacity:0.7;
    margin-bottom:5px;
}

/* Hourly */
.hourly{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding-bottom:5px;
}

.hour{
    background:#1c1c1c;
    padding:10px;
    border-radius:12px;
    min-width:90px;
    text-align:center;
    font-size:12px;
}

/* Colors */
.good{ color:#5cff5c; }
.caution{ color:yellow; }
.bad{ color:#ff6666; }

</style>
</head>

<body>

<h1>Pine Beach SUP 🌊</h1>

<!-- PADDLE CONDITIONS FIRST -->
<div class="paddle">
    <div class="label">Paddle Conditions</div>
    <div id="rating" class="big">--</div>
</div>

<!-- 4 MAIN METRICS -->
<div class="grid">

    <div class="card">
        <div class="label">🌡️ Temp</div>
        <div id="temp" class="big">--</div>
    </div>

    <div class="card">
        <div class="label">💨 Wind</div>
        <div id="wind" class="big">--</div>
    </div>

    <div class="card">
        <div class="label">🌪️ Gusts</div>
        <div id="gusts" class="big">--</div>
    </div>

    <div class="card">
        <div class="label">🌫️ AQI</div>
        <div id="aqi" class="big">--</div>
    </div>

</div>

<h2 style="font-size:18px;margin:10px 0;">Daylight Forecast</h2>
<div id="hourly" class="hourly"></div>

<script>

async function loadWeather(){

const weatherURL =
'https://api.open-meteo.com/v1/forecast?latitude=45.431&longitude=-73.742&current=temperature_2m,wind_speed_10m,wind_gusts_10m&hourly=temperature_2m,wind_speed_10m,wind_gusts_10m,precipitation_probability,sunrise,sunset&timezone=auto';

const airURL =
'https://air-quality-api.open-meteo.com/v1/air-quality?latitude=45.431&longitude=-73.742&current=us_aqi';

const weatherResponse = await fetch(weatherURL);
const weatherData = await weatherResponse.json();

const airResponse = await fetch(airURL);
const airData = await airResponse.json();

const current = weatherData.current;

// MAIN VALUES
document.getElementById('temp').innerHTML =
Math.round(current.temperature_2m) + '°C';

document.getElementById('wind').innerHTML =
Math.round(current.wind_speed_10m) + ' km/h';

document.getElementById('gusts').innerHTML =
Math.round(current.wind_gusts_10m) + ' km/h';

document.getElementById('aqi').innerHTML =
airData.current.us_aqi;

// RATING
const wind = current.wind_speed_10m;
const gusts = current.wind_gusts_10m;

let rating = '';
let ratingClass = '';

if(wind < 12 && gusts < 18){
    rating = 'EXCELLENT 🌊';
    ratingClass = 'good';
}
else if(wind < 20){
    rating = 'CAUTION ⚠️';
    ratingClass = 'caution';
}
else{
    rating = 'NO GO ⛔';
    ratingClass = 'bad';
}

document.getElementById('rating').innerHTML =
'<span class="' + ratingClass + '">' + rating + '</span>';

// 🌅 DAYLIGHT FILTER
const sunrise = new Date(weatherData.daily?.sunrise?.[0] || weatherData.hourly.time[0]);
const sunset = new Date(weatherData.daily?.sunset?.[0] || weatherData.hourly.time[0]);

const hourlyDiv = document.getElementById('hourly');
hourlyDiv.innerHTML = '';

for(let i = 0; i < 24; i++){

    const time = new Date(weatherData.hourly.time[i]);

    // only daylight hours
    if(time < sunrise || time > sunset) continue;

    const hour = weatherData.hourly.time[i].split('T')[1].slice(0,5);

    hourlyDiv.innerHTML += `
    <div class="hour">
        <div>${hour}</div>
        <div>🌡️ ${Math.round(weatherData.hourly.temperature_2m[i])}°</div>
        <div>💨 ${Math.round(weatherData.hourly.wind_speed_10m[i])}</div>
        <div>🌪️ ${Math.round(weatherData.hourly.wind_gusts_10m[i])}</div>
        <div>☔ ${weatherData.hourly.precipitation_probability[i]}%</div>
    </div>
    `;
}

}

loadWeather();
setInterval(loadWeather, 600000);

</script>

</body>
</html>
